<div *ngIf="loading && isEdit" class="loading-container">
  <mat-spinner></mat-spinner>
</div>

<div *ngIf="!(loading && isEdit)" class="form-container">
  <div class="form-header">
    <button mat-icon-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>{{ pageTitle }}</h1>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-grid">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Device Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. iPhone 15 Pro" />
            <mat-error *ngIf="hasError('name', 'required')">Name is required</mat-error>
            <mat-error *ngIf="hasError('name', 'maxlength')">Max 150 characters</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Manufacturer</mat-label>
            <input matInput formControlName="manufacturer" placeholder="e.g. Apple" />
            <mat-error *ngIf="hasError('manufacturer', 'required')">Manufacturer is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Type</mat-label>
            <mat-select formControlName="type">
              <mat-option value="Phone">Phone</mat-option>
              <mat-option value="Tablet">Tablet</mat-option>
            </mat-select>
            <mat-error *ngIf="hasError('type', 'required')">Type is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>RAM (GB)</mat-label>
            <input matInput type="number" formControlName="ramAmount" min="1" />
            <mat-error *ngIf="hasError('ramAmount', 'required')">RAM is required</mat-error>
            <mat-error *ngIf="hasError('ramAmount', 'min')">Minimum 1 GB</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Operating System</mat-label>
            <input matInput formControlName="operatingSystem" placeholder="e.g. iOS" />
            <mat-error *ngIf="hasError('operatingSystem', 'required')">OS is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>OS Version</mat-label>
            <input matInput formControlName="osVersion" placeholder="e.g. 17.4" />
            <mat-error *ngIf="hasError('osVersion', 'required')">OS Version is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Processor</mat-label>
            <input matInput formControlName="processor" placeholder="e.g. A17 Pro" />
            <mat-error *ngIf="hasError('processor', 'required')">Processor is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3"
              placeholder="Optional description..."></textarea>
          </mat-form-field>

        </div>

        <div class="form-actions">
          <button mat-stroked-button type="button" (click)="goBack()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="loading">
            <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
            <ng-container *ngIf="!loading">
              <mat-icon>{{ isEdit ? 'save' : 'add' }}</mat-icon>
              {{ submitLabel }}
            </ng-container>
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
